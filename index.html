<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മസ്ജിദ് എൻട്രി ഫോം</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .form-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { text-align: center; color: #1a5d1a; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>വരവ് ചിലവ് എൻട്രി</h2>
    <form id="entryForm">
        <label>തീയതി (DD-MM-YYYY)</label>
        <input type="text" id="date" placeholder="ഉദാ: 21-04-2026" required>
        <label>വൗച്ചർ നമ്പർ</label>
        <input type="text" id="voucher">
        <label>വിവരണം</label>
        <input type="text" id="particulars" required>
        <label>വരവ് (Income)</label>
        <input type="number" id="income" value="0">
        <label>ചിലവ് (Expense)</label>
        <input type="number" id="expense" value="0">
        <button type="submit" id="submitBtn">സേവ് ചെയ്യുക</button>
    </form>
</div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwVdNwh9xSnIJN5aLgjNQ-R267MVtWmkPAYV_eLbriGviGekag8U40SXNkpbB9HsWFO/exec';
    const form = document.getElementById('entryForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "അയക്കുന്നു...";
        let finalURL = scriptURL + "?date=" + encodeURIComponent(document.getElementById('date').value) +
            "&voucher=" + encodeURIComponent(document.getElementById('voucher').value) +
            "&particulars=" + encodeURIComponent(document.getElementById('particulars').value) +
            "&income=" + encodeURIComponent(document.getElementById('income').value) +
            "&expense=" + encodeURIComponent(document.getElementById('expense').value);

        fetch(finalURL, { method: 'POST', mode: 'no-cors' })
        .then(() => {
            alert("സേവ് ചെയ്തു!");
            form.reset();
            btn.disabled = false;
            btn.innerText = "സേവ് ചെയ്യുക";
        }).catch(() => {
            alert("Error!");
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
