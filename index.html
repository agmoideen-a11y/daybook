<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Book Entry</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; padding: 15px; display: flex; justify-content: center; }
        .form-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #28a745; outline: none; box-shadow: 0 0 5px rgba(40,167,69,0.3); }
        .btn { background-color: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background-color: #218838; }
        .footer-note { text-align: center; font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Day Book Entry</h2>
    <form id="daybookForm">
        <label>തീയതി (DD-MM-YYYY)</label>
        <input type="text" name="date" id="todayDate" placeholder="01-03-2026" maxlength="10" required>

        <label>വൗച്ചർ / റസീപ്റ്റ് നമ്പർ</label>
        <input type="text" name="voucher" placeholder="ഉദാ: V101 അല്ലെങ്കിൽ R202">

        <label>വിവരണം (Particulars)</label>
        <input type="text" name="particulars" placeholder="എന്തിനുള്ള തുക?" required>

        <label>വരവ് (Income)</label>
        <input type="number" name="income" value="0" onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';">

        <label>ചിലവ് (Expense)</label>
        <input type="number" name="expense" value="0" onfocus="if(this.value=='0')this.value='';" onblur="if(this.value=='')this.value='0';">

        <button type="submit" class="btn" id="submitBtn">ഷീറ്റിലേക്ക് അയക്കുക</button>
    </form>
    <p class="footer-note">സുരക്ഷിതമായി കണക്കുകൾ സൂക്ഷിക്കാം</p>
</div>

<script>
    const dateInput = document.getElementById('todayDate');

    // ഇന്നത്തെ തീയതി തനിയെ സെറ്റ് ചെയ്യാൻ
    function setTodayDate() {
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        dateInput.value = dd + '-' + mm + '-' + yyyy;
    }
    setTodayDate();

    // നമ്പർ ടൈപ്പ് ചെയ്യുമ്പോൾ തനിയെ ഹൈഫൻ (-) വരാൻ
    dateInput.addEventListener('input', function(e) {
        let input = e.target.value.replace(/\D/g, ''); // അക്ഷരങ്ങൾ ഒഴിവാക്കുന്നു
        if (input.length > 8) input = input.substr(0, 8);
        
        let formatted = "";
        if (input.length > 0) formatted += input.substr(0, 2);
        if (input.length > 2) formatted += '-' + input.substr(2, 2);
        if (input.length > 4) formatted += '-' + input.substr(4, 4);
        
        e.target.value = formatted;
    });

    const scriptURL = 'https://script.google.com/macros/s/AKfycbzUvsNvN4ufjiM8l9I4iRZcMmJp4PvRQAevXnaE7iOsfpxgTXmurUAKF7gmB97J4Siv/exec';
    const form = document.getElementById('daybookForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "അയച്ചുകൊണ്ടിരിക്കുന്നു...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
                alert("വിജയകരമായി ഷീറ്റിൽ രേഖപ്പെടുത്തി!");
                form.reset();
                setTodayDate();
                btn.disabled = false;
                btn.innerHTML = "ഷീറ്റിലേക്ക് അയക്കുക";
            })
            .catch(error => {
                alert('എന്തോ തകരാർ സംഭവിച്ചു!');
                btn.disabled = false;
                btn.innerHTML = "വീണ്ടും ശ്രമിക്കുക";
            });
    });
</script>

</body>
</html>
