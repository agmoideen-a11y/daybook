<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മസ്ജിദ് & മദ്രസ ഡേ ബുക്ക് റിപ്പോർട്ട്</title>
    <style>
        :root {
            --primary-green: #1a5d1a;
            --light-green: #28a745;
            --bg-gray: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            padding: 15px;
            margin: 0;
            direction: ltr;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            border-bottom: 3px solid var(--light-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .header h2 { color: var(--primary-green); margin: 0; }
        
        .search-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: flex-end;
            border: 1px solid #ddd;
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 13px; font-weight: bold; color: #555; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        .btn-search { background: var(--primary-green); }
        .btn-print { background: var(--light-green); }
        .btn:hover { opacity: 0.8; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th {
            background: var(--light-green);
            color: white;
            padding: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: center;
            font-size: 14px;
        }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .income-amt { color: green; font-weight: bold; }
        .expense-amt { color: red; font-weight: bold; }
        
        .loading { text-align: center; padding: 20px; font-weight: bold; color: var(--primary-green); }

        @media print {
            .search-card, .btn { display: none; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>വരവ് ചിലവ് റിപ്പോർട്ട്</h2>
    </div>

    <div class="search-card">
        <div class="input-group">
            <label>മുതൽ (DD-MM-YYYY):</label>
            <input type="text" id="fromDate" placeholder="01-04-2024">
        </div>
        <div class="input-group">
            <label>വരെ (DD-MM-YYYY):</label>
            <input type="text" id="toDate" placeholder="31-03-2025">
        </div>
        <button class="btn btn-search" onclick="applyFilters()">റിപ്പോർട്ട് കാണുക</button>
        <button class="btn btn-print" onclick="window.print()">Print എടുക്കുക</button>
    </div>

    <div id="loadingStatus" class="loading">വിവരങ്ങൾ ശേഖരിക്കുന്നു... ദയവായി കാത്തിരിക്കൂ...</div>

    <table id="myTable" style="display:none;">
        <thead>
            <tr>
                <th>തീയതി</th>
                <th>വിവരണം</th>
                <th>വരവ്</th>
                <th>ചിലവ്</th>
                <th>ബാലൻസ്</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr id="totalRow" style="background:#eee; font-weight:bold; font-size: 15px;"></tr>
        </tfoot>
    </table>
</div>

<script>
    // താങ്കൾ നൽകിയ പുതിയ ആപ്പ് സ്ക്രിപ്റ്റ് ലിങ്ക്
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzMyz3B7vYSUOVP2xYeIQLo3TuKIzmgmhVkn4RuU06nJSfb3gRf_jRB7uv4G4EJ9pfU/exec';

    let allData = [];

    // ഡാറ്റ ലോഡ് ചെയ്യുന്ന ഫങ്ക്ഷൻ
    function loadData() {
        fetch(scriptURL + "?action=read")
            .then(res => res.json())
            .then(data => {
                allData = data;
                document.getElementById('loadingStatus').style.display = 'none';
                document.getElementById('myTable').style.display = 'table';
                applyFilters();
            })
            .catch(err => {
                document.getElementById('loadingStatus').innerHTML = "ഡാറ്റ ലഭിക്കുന്നതിൽ തടസ്സം നേരിട്ടു. ലിങ്ക് ശരിയാണോ എന്ന് പരിശോധിക്കുക.";
                console.error(err);
            });
    }

    // തീയതി ഏത് രൂപത്തിലാണെങ്കിലും (7/4, 7-4) അതിനെ 07-04-2024 എന്ന രൂപത്തിലേക്ക് മാറ്റാനും
    // ഓർഡർ ചെയ്യാനും സഹായിക്കുന്ന ഫങ്ക്ഷൻ
    function parseDateInfo(dateStr) {
        if (!dateStr) return null;
        
        let s = dateStr.toString().replace(/\//g, '-');
        let parts = s.split('-');
        
        if (parts.length !== 3) return null;

        let day = parts[0].padStart(2, '0');
        let month = parts[1].padStart(2, '0');
        let year = parts[2];

        // വർഷം 2 അക്കമാണെങ്കിൽ (ഉദാ: 24) അതിനെ 2024 ആക്കുന്നു
        if (year.length === 2) year = "20" + year;

        return {
            display: day + "-" + month + "-" + year,
            sortValue: new Date(year, month - 1, day).getTime()
        };
    }

    function applyFilters() {
        // തീയതി അനുസരിച്ച് ഡാറ്റ ഓർഡർ ചെയ്യുന്നു (Sorting)
        let sortedData = [...allData].sort((a, b) => {
            let dateA = parseDateInfo(a.date)?.sortValue || 0;
            let dateB = parseDateInfo(b.date)?.sortValue || 0;
            return dateA - dateB;
        });

        let fromVal = parseDateInfo(document.getElementById('fromDate').value)?.sortValue || 0;
        let toVal = parseDateInfo(document.getElementById('toDate').value)?.sortValue || 9999999999999;

        let tableRows = '';
        let totalIncome = 0;
        let totalExpense = 0;
        let runningBalance = 0;

        sortedData.forEach(item => {
            let dateInfo = parseDateInfo(item.date);
            
            if (dateInfo && dateInfo.sortValue >= fromVal && dateInfo.sortValue <= toVal) {
                let inc = parseFloat(item.income) || 0;
                let exp = parseFloat(item.expense) || 0;
                totalIncome += inc;
                totalExpense += exp;
                runningBalance = totalIncome - totalExpense;

                tableRows += <tr>
                    <td>${dateInfo.display}</td>
                    <td style="text-align:left;">${item.particulars || ''}</td>
                    <td class="income-amt">${inc.toFixed(2)}</td>
                    <td class="expense-amt">${exp.toFixed(2)}</td>
                    <td style="font-weight:bold;">${runningBalance.toFixed(2)}</td>
                </tr>;
            }
        });

        document.getElementById('tableBody').innerHTML = tableRows;
        document.getElementById('totalRow').innerHTML = 
            <td colspan="2" style="text-align:right;">ആകെ (Total):</td>
            <td>${totalIncome.toFixed(2)}</td>
            <td>${totalExpense.toFixed(2)}</td>
            <td>${runningBalance.toFixed(2)}</td>
        ;
    }

    window.onload = loadData;
</script>

</body>
</html>
