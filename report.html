<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മസ്ജിദ് & മദ്രസ റിപ്പോർട്ട്</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 15px; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 1000px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a5d1a; border-bottom: 3px solid #28a745; padding-bottom: 10px; margin-bottom: 20px; }
        .filter-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background-color: #28a745; color: white; text-align: center; }
        .income-text { color: #28a745; font-weight: bold; text-align: center; }
        .expense-text { color: #d32f2f; font-weight: bold; text-align: center; }
        .balance-text { color: #007bff; font-weight: bold; text-align: center; }
        .total-row { background-color: #e8f5e9 !important; font-weight: bold; }
        .btn { padding: 10px 15px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>മസ്ജിദ് & മദ്രസ ഡേ ബുക്ക് റിപ്പോർട്ട്</h2>
    <div class="filter-section">
        <input type="date" id="fromDate">
        <input type="date" id="toDate">
        <button class="btn" style="background:#2c3e50; color:white;" onclick="applyFilters()">കാണുക</button>
        <button class="btn" style="background:#28a745; color:white;" onclick="window.print()">Print</button>
    </div>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>തീയതി</th>
                    <th>വിവരണം</th>
                    <th>വരവ്</th>
                    <th>ചിലവ്</th>
                    <th>ബാലൻസ്</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" style="text-align:center;">ഡാറ്റ ലോഡ് ചെയ്യുന്നു...</td></tr>
            </tbody>
            <tfoot>
                <tr id="totalRow" class="total-row"></tr>
            </tfoot>
        </table>
    </div>
</div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw-z0psRcjO2QMZPdk_j9cI07lvUcP4GcOeAc1cNQ__LUr7LxcADuJS5Esg12CGUCY4/exec';
    let allData = [];

    function loadData() {
        fetch(scriptURL + "?action=read")
            .then(res => res.json())
            .then(data => {
                allData = data;
                displayData(allData);
            })
            .catch(err => {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">പിശക്! ലിങ്ക് പരിശോധിക്കുക.</td></tr>';
            });
    }

    function displayData(data) {
        let rows = '';
        let tInc = 0; let tExp = 0;
        data.forEach(item => {
            let i = parseFloat(item.income) || 0;
            let e = parseFloat(item.expense) || 0;
            let b = item.balance || (tInc + i - tExp - e);
            tInc += i; tExp += e;
            // ശ്രദ്ധിക്കുക: ഇവിടെ  ഉപയോഗിച്ചിട്ടുണ്ട്
            rows += <tr>
                <td>${item.date}</td>
                <td>${item.particulars}</td>
                <td class="income-text">${i}</td>
                <td class="expense-text">${e}</td>
                <td class="balance-text">${b}</td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="5" style="text-align:center;">ഡാറ്റയില്ല.</td></tr>';
    document.getElementById('totalRow').innerHTML = 
            <td colspan="2" style="text-align:right">ആകെ:</td>
            <td class="income-text">${tInc}</td>
            <td class="expense-text">${tExp}</td>
            <td class="balance-text">${tInc - tExp}</td>;
    }
    window.onload = loadData;
</script>
</body>
</html>
