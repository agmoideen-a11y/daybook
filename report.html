<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മസ്ജിദ് റിപ്പോർട്ട്</title>
    <style>
        :root { --primary: #1a5d1a; --secondary: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--secondary); color: white; padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; }
        .inc-col { color: green; font-weight: bold; }
        .exp-col { color: red; font-weight: bold; }
        .control-panel { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .btn { padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; background: #007bff; }
        @media print { .control-panel, .btn, input { display: none !important; } }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align:center;"><h2>വരവ് ചിലവ് റിപ്പോർട്ട്</h2></div>
    
    <div class="control-panel">
        <input type="text" id="fromDate" placeholder="DD-MM-YYYY (മുതൽ)" style="padding:8px;">
        <input type="text" id="toDate" placeholder="DD-MM-YYYY (വരെ)" style="padding:8px;">
        <button class="btn" onclick="applyFilters()">കാണുക</button>
        <button class="btn" style="background:#6c757d" onclick="window.print()">പ്രിന്റ്</button>
    </div>

    <div id="msg" style="text-align:center; font-weight:bold;">വിവരങ്ങൾ ലോഡ് ചെയ്യുന്നു...</div>

    <table id="myTable" style="display:none;">
        <thead>
            <tr><th>തീയതി</th><th>വിവരണം</th><th class="inc-col">വരവ്</th><th class="exp-col">ചിലവ്</th><th>ബാലൻസ്</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot><tr id="totalRow" style="background:#eee; font-weight:bold;"></tr></tfoot>
    </table>
</div>

<script>
    // ചിത്രത്തിൽ കണ്ട പുതിയ ലിങ്ക് ആണിത്
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyn9Fq2Eu6K5-xCC1-zMRXIzRga_tvfYSOOuvikYfgQHBfHgsJCFYOALMmbXDakNHzv/exec';

    let allData = [];

    async function loadData() {
        try {
            const res = await fetch(scriptURL + "?action=read");
            allData = await res.json();
            document.getElementById('msg').style.display = 'none';
            document.getElementById('myTable').style.display = 'table';
            applyFilters();
        } catch (err) {
            document.getElementById('msg').innerHTML = "ഡാറ്റ ലഭിക്കുന്നില്ല. ഷീറ്റിൽ എൻട്രികൾ ഉണ്ടെന്ന് ഉറപ്പുവരുത്തുക.";
        }
    }

    function parseDate(dateStr) {
        if (!dateStr) return null;
        let s = dateStr.toString().replace(/\//g, '-');
        let parts = s.split('-');
        if (parts.length !== 3) return null;
        let d = parts[0].padStart(2, '0');
        let m = parts[1].padStart(2, '0');
        let y = parts[2].length === 2 ? "20" + parts[2] : parts[2];
        return { display: d + "-" + m + "-" + y, sortValue: new Date(y, m - 1, d).getTime() };
    }

    function applyFilters() {
        let from = parseDate(document.getElementById('fromDate').value)?.sortValue || 0;
        let to = parseDate(document.getElementById('toDate').value)?.sortValue || 9999999999999;
        
        let sorted = [...allData].sort((a, b) => (parseDate(a.date)?.sortValue  0) - (parseDate(b.date)?.sortValue  0));
        
        let rows = ''; let tInc = 0; let tExp = 0;
        sorted.forEach(item => {
            let dInfo = parseDate(item.date);
            if (dInfo && dInfo.sortValue >= from && dInfo.sortValue <= to) {
                let inc = parseFloat(item.income) || 0;
                let exp = parseFloat(item.expense) || 0;
                tInc += inc; tExp += exp;
                rows += <tr><td>${dInfo.display}</td><td style="text-align:left;">${item.particulars}</td><td class="inc-col">${inc}</td><td class="exp-col">${exp}</td><td>${tInc - tExp}</td></tr>;
            }
        });
        document.getElementById('tableBody').innerHTML = rows;
        document.getElementById('totalRow').innerHTML = <td colspan="2">ആകെ</td><td class="inc-col">${tInc}</td><td class="exp-col">${tExp}</td><td>${tInc - tExp}</td>;
    }

    window.onload = loadData;
</script>
</body>
</html>
