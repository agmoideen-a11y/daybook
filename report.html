<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മസ്ജിദ് & മദ്രസ ഡേ ബുക്ക്</title>
    <style>
        :root { --primary-green: #1a5d1a; --light-green: #28a745; --bg-gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--light-green); padding-bottom: 15px; }
        .header h2 { color: var(--primary-green); margin: 0; }
        
        .search-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; justify-content: center; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 13px; font-weight: bold; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        
        .btn { padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-search { background: var(--primary-green); }
        .btn-print { background: var(--light-green); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: var(--light-green); color: white; padding: 12px; border: 1px solid #ddd; }
        td { padding: 12px; border: 1px solid #eee; text-align: center; font-size: 14px; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .income-amt { color: #28a745; font-weight: bold; }
        .expense-amt { color: #dc3545; font-weight: bold; }
        .total-row { background-color: #e8f5e9 !important; font-weight: bold; }

        @media print { .search-card, .btn { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>മസ്ജിദ് & മദ്രസ വരവ് ചിലവ് റിപ്പോർട്ട്</h2>
    </div>

    <div class="search-card">
        <div class="input-group">
            <label>മുതൽ (DD-MM-YYYY):</label>
            <input type="text" id="fromDate" placeholder="01-04-2026">
        </div>
        <div class="input-group">
            <label>വരെ (DD-MM-YYYY):</label>
            <input type="text" id="toDate" placeholder="30-04-2026">
        </div>
        <div class="input-group">
            <label>തരം:</label>
            <select id="typeFilter">
                <option value="all">എല്ലാം</option>
                <option value="income">വരവ് മാത്രം</option>
                <option value="expense">ചിലവ് മാത്രം</option>
            </select>
        </div>
        <button class="btn btn-search" onclick="applyFilters()">കാണുക</button>
        <button class="btn btn-print" onclick="window.print()">Print</button>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>തീയതി</th>
                    <th>വിവരണം</th>
                    <th>വരവ്</th>
                    <th>ചിലവ്</th>
                    <th>ബാലൻസ്</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5">ഡാറ്റ ലോഡ് ചെയ്യുന്നു...</td></tr>
            </tbody>
            <tfoot>
                <tr id="totalRow" class="total-row"></tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyPW-vGoM7MMQS1TZ_G53t-faXLL3P7hITkPWxZgJmb_Fqk3wGUauZY8Z_b8nAK3vtR/exec';
    let allData = [];

    function loadData() {
        fetch(scriptURL + "?action=read")
            .then(res => res.json())
            .then(data => {
                allData = data;
                applyFilters(); // ആദ്യമേ ഡാറ്റ കാണിക്കാൻ
            })
            .catch(err => {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5">ഡാറ്റ ലോഡ് ചെയ്യാൻ സാധിച്ചില്ല.</td></tr>';
            });
    }

    // തീയതിയെ കൃത്യമായി ഫോർമാറ്റ് ചെയ്യാനും (07-04-2026) താരതമ്യം ചെയ്യാനും
    function processDate(dateStr) {
        if (!dateStr) return null;
        let parts = dateStr.toString().split('-');
        if (parts.length !== 3) return null;
        
        // തീയതിയും മാസവും 0 ചേർത്ത് ക്രമീകരിക്കുന്നു (ഉദാ: 7 മാറ്റി 07 ആക്കുന്നു)
        let day = parts[0].padStart(2, '0');
        let month = parts[1].padStart(2, '0');
        let year = parts[2];

        return {
            formatted: `${day}-${month}-${year}`,
            obj: new Date(year, month - 1, day)
        };
    }

    function applyFilters() {
        const fromStr = document.getElementById('fromDate').value;
        const toStr = document.getElementById('toDate').value;
        const type = document.getElementById('typeFilter').value;

        // തീയതി അനുസരിച്ച് ലിസ്റ്റ് ക്രമീകരിക്കുന്നു (Sorting)
        let sortedData = [...allData].sort((a, b) => {
            let d1 = processDate(a.date)?.obj || 0;
            let d2 = processDate(b.date)?.obj || 0;
            return d1 - d2;
        });

        let filtered = sortedData;

        if (fromStr || toStr) {
            const fDate = processDate(fromStr)?.obj || new Date(2000, 0, 1);
            const tDate = processDate(toStr)?.obj || new Date(2100, 0, 1);

            filtered = filtered.filter(item => {
                const itemD = processDate(item.date)?.obj;
                return itemD && itemD >= fDate && itemD <= tDate;
            });
        }

        if (type === 'income') filtered = filtered.filter(item => parseFloat(item.income) > 0);
        if (type === 'expense') filtered = filtered.filter(item => parseFloat(item.expense) > 0);

        displayData(filtered);
    }

    function displayData(data) {
        let rows = '';
        let totalIncome = 0; let totalExpense = 0;
        
        data.forEach(item => {
            let i = parseFloat(item.income) || 0;
            let e = parseFloat(item.expense) || 0;
            totalIncome += i; totalExpense += e;

            let dateInfo = processDate(item.date);

            rows += `<tr>
                <td>${dateInfo ? dateInfo.formatted : item.date}</td>
                <td>${item.particulars}</td>
                <td class="income-amt">${i}</td>
                <td class="expense-amt">${e}</td>
                <td style="color:#007bff; font-weight:bold;">${totalIncome - totalExpense}</td>
            </tr>`;
        });

        document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="5">വിവരങ്ങൾ ലഭ്യമല്ല.</td></tr>';
        document.getElementById('totalRow').innerHTML = `
            <td colspan="2" style="text-align:right">ആകെ:</td>
            <td class="income-amt">${totalIncome}</td>
            <td class="expense-amt">${totalExpense}</td>
            <td style="color:#007bff; font-weight:bold;">${totalIncome - totalExpense}</td>
        `;
    }

    window.onload = loadData;
</script>
</body>
</html>
