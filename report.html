<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzMyz3B7vYSUOVP2xYeIQLo3TuKIzmgmhVkn4RuU06nJSfb3gRf_jRB7uv4G4EJ9pfU/exec';

    function parseDateInfo(dateStr) {
        if (!dateStr) return null;
        // ഗൂഗിൾ നൽകുന്ന നമ്പറുകളെ തീയതിയാക്കി മാറ്റുന്നു
        let d = new Date(dateStr);
        if (isNaN(d.getTime())) {
            let s = dateStr.toString().replace(/\//g, '-');
            let parts = s.split('-');
            if (parts.length === 3) {
                let day = parts[0].padStart(2, '0');
                let month = parts[1].padStart(2, '0');
                let year = parts[2].length === 2 ? "20" + parts[2] : parts[2];
                return { display: day + "-" + month + "-" + year, sortValue: new Date(year, month - 1, day).getTime() };
            }
            return null;
        }
        let dd = String(d.getDate()).padStart(2, '0');
        let mm = String(d.getMonth() + 1).padStart(2, '0');
        return { display: dd + "-" + mm + "-" + d.getFullYear(), sortValue: d.getTime() };
    }
</script>
