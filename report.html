<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മസ്ജിദ് & മദ്രസ റിപ്പോർട്ട് ബുക്ക്</title>
    <style>
        :root { --primary-green: #1a5d1a; --light-green: #28a745; --bg-gray: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-gray); padding: 15px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--light-green); padding-bottom: 10px; margin-bottom: 20px; }
        
        .control-panel { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; text-align: center; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: flex-end; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; font-weight: bold; font-size: 13px; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

        .button-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-search { background: #007bff; }
        .btn-all { background: #6c757d; }
        .btn-income { background: #28a745; }
        .btn-expense { background: #dc3545; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--light-green); color: white; padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; }
        .income-col { color: green; font-weight: bold; }
        .expense-col { color: red; font-weight: bold; }
        .total-row { background: #eee; font-weight: bold; font-size: 16px; }

        @media print {
            .control-panel, .btn { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            .hide-income .income-col, .hide-income th:nth-child(3), .hide-income .total-inc-cell { display: none; }
            .hide-expense .expense-col, .hide-expense th:nth-child(4), .hide-expense .total-exp-cell { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>വരവ് ചിലവ് റിപ്പോർട്ട്</h2>
    </div>

    <div class="control-panel">
        <div class="filter-row">
            <div class="input-group">
                <label>മുതൽ (DD-MM-YYYY):</label>
                <input type="text" id="fromDate" placeholder="01-01-2026">
            </div>
            <div class="input-group">
                <label>വരെ (DD-MM-YYYY):</label>
                <input type="text" id="toDate" placeholder="31-12-2026">
            </div>
            <button class="btn btn-search" onclick="applyFilters()">കാണുക</button>
        </div>
        
        <div class="button-group">
            <button class="btn btn-all" onclick="printReport('all')">മൊത്തം പ്രിന്റ്</button>
            <button class="btn btn-income" onclick="printReport('income')">വരവ് മാത്രം പ്രിന്റ്</button>
            <button class="btn btn-expense" onclick="printReport('expense')">ചിലവ് മാത്രം പ്രിന്റ്</button>
        </div>
    </div>

    <table id="myTable">
        <thead>
            <tr>
                <th>തീയതി</th>
                <th>വിവരണം</th>
                <th class="income-col">വരവ്</th>
                <th class="expense-col">ചിലവ്</th>
                <th>ബാലൻസ്</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5">വിവരങ്ങൾ ശേഖരിക്കുന്നു...</td></tr>
        </tbody>
        <tfoot>
            <tr id="totalRow" class="total-row"></tr>
        </tfoot>
    </table>
</div>
<script>
    // താങ്കൾ നൽകിയ പുതിയ ലിങ്ക്
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw5CwyhYRp0qoQVWayYh5QqczKKFFHm2v6QiIhc22U5XKgeWfwxPW4FrzlVmH2BF50K/exec';
    let allData = [];

    async function loadData() {
        try {
            const response = await fetch(scriptURL + "?action=read");
            allData = await response.json();
            applyFilters();
        } catch (e) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5">ഡാറ്റ ലഭ്യമായില്ല. ലിങ്ക് പരിശോധിക്കുക.</td></tr>';
        }
    }

    // തീയതി ശരിയാക്കാനും ക്രമീകരിക്കാനുമുള്ള ഫങ്ക്ഷൻ
    function parseDateInfo(dateStr) {
        if (!dateStr) return null;
        let s = dateStr.toString().replace(/\//g, '-');
        let parts = s.split('-');
        if (parts.length !== 3) return null;
        
        let d = parts[0].padStart(2, '0');
        let m = parts[1].padStart(2, '0');
        let y = parts[2];
        if (y.length === 2) y = "20" + y;

        return {
            display: d + "-" + m + "-" + y,
            sortValue: new Date(y, m - 1, d).getTime()
        };
    }

    function applyFilters() {
        // തീയതി ക്രമത്തിൽ അടുക്കുന്നു
        let sorted = [...allData].sort((a, b) => (parseDateInfo(a.date)?.sortValue  0) - (parseDateInfo(b.date)?.sortValue  0));
        
        let from = parseDateInfo(document.getElementById('fromDate').value)?.sortValue || 0;
        let to = parseDateInfo(document.getElementById('toDate').value)?.sortValue || 9999999999999;

        let rows = ''; let tInc = 0; let tExp = 0;

        sorted.forEach(item => {
            let dInfo = parseDateInfo(item.date);
            if (dInfo && dInfo.sortValue >= from && dInfo.sortValue <= to) {
                let inc = parseFloat(item.income) || 0;
                let exp = parseFloat(item.expense) || 0;
                tInc += inc; tExp += exp;
                rows += <tr>
                    <td>${dInfo.display}</td>
                    <td style="text-align:left;">${item.particulars || ''}</td>
                    <td class="income-col">${inc}</td>
                    <td class="expense-col">${exp}</td>
                    <td>${tInc - tExp}</td>
                </tr>;
            }
        });

        document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="5">ഈ തീയതികളിൽ വിവരങ്ങൾ ലഭ്യമല്ല.</td></tr>';
        document.getElementById('totalRow').innerHTML = 
            <td colspan="2">ആകെ (Total)</td>
            <td class="income-col total-inc-cell">${tInc}</td>
            <td class="expense-col total-exp-cell">${tExp}</td>
            <td>${tInc - tExp}</td>
        ;
    }

    function printReport(type) {
        document.body.classList.remove('hide-income', 'hide-expense');
        if (type === 'income') document.body.classList.add('hide-expense');
        if (type === 'expense') document.body.classList.add('hide-income');
        window.print();
    }

    window.onload = loadData;
</script>
</body>
</html>
