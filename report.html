<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മസ്ജിദ് റിപ്പോർട്ട് ബുക്ക്</title>
    <style>
        :root { --primary: #1a5d1a; --secondary: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--secondary); margin-bottom: 20px; padding-bottom: 10px; }
        .control-panel { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #dee2e6; text-align: center; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 5px; }
        .btn-all { background: #6c757d; }
        .btn-inc { background: #28a745; }
        .btn-exp { background: #dc3545; }
        .btn-view { background: #007bff; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--secondary); color: white; padding: 15px; border: 1px solid #ddd; }
        td { padding: 12px; border: 1px solid #eee; text-align: center; }
        .income-col { color: #28a745; font-weight: bold; }
        .expense-col { color: #dc3545; font-weight: bold; }
        .total-row { background: #f1f1f1; font-weight: bold; }
        #loadingMsg { text-align: center; font-weight: bold; padding: 20px; color: var(--primary); }

        @media print {
            .control-panel, .btn { display: none !important; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; width: 100%; border: none; }
            .hide-inc .income-col, .hide-inc th:nth-child(3), .hide-inc .total-inc { display: none; }
            .hide-exp .expense-col, .hide-exp th:nth-child(4), .hide-exp .total-exp { display: none; }
        }
    </style>
</head>
<body id="mainBody">
<div class="container">
    <div class="header"><h1>വരവ് ചിലവ് റിപ്പോർട്ട്</h1></div>
    
    <div class="control-panel">
        <input type="text" id="fromDate" placeholder="DD-MM-YYYY (മുതൽ)">
        <input type="text" id="toDate" placeholder="DD-MM-YYYY (വരെ)">
        <button class="btn btn-view" onclick="applyFilters()">കാണുക</button>
        <hr style="margin:15px 0; border:0; border-top:1px solid #ddd;">
        <button class="btn btn-all" onclick="printReport('all')">മൊത്തം പ്രിന്റ്</button>
        <button class="btn btn-inc" onclick="printReport('inc')">വരവ് മാത്രം പ്രിന്റ്</button>
        <button class="btn btn-exp" onclick="printReport('exp')">ചിലവ് മാത്രം പ്രിന്റ്</button>
    </div>

    <div id="loadingMsg">വിവരങ്ങൾ ശേഖരിക്കുന്നു...</div>

    <table id="reportTable" style="display:none;">
        <thead>
            <tr>
                <th>തീയതി</th>
                <th>വിവരണം</th>
                <th class="income-col">വരവ്</th>
                <th class="expense-col">ചിലവ്</th>
                <th>ബാക്കി</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr id="totalRow" class="total-row"></tr>
        </tfoot>
    </table>
</div>

<script>
    // താങ്കൾ അവസാനമായി എടുത്ത ഗൂഗിൾ സ്ക്രിപ്റ്റ് ലിങ്ക് ഇവിടെ ചേർത്തിട്ടുണ്ട്
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyemHguqZcXhxvNEI_qfL9FU9Zt4AAXscRwN8GH26xQCDEDDH8XfGQfJXvbkvCMRM6q/exec';
    let allData = [];

    async function loadData() {
        try {
            const response = await fetch(scriptURL + "?action=read");
            allData = await response.json();document.getElementById('loadingMsg').style.display = 'none';
            document.getElementById('reportTable').style.display = 'table';
            applyFilters();
        } catch (error) {
            document.getElementById('loadingMsg').innerHTML = "വിവരങ്ങൾ ലഭിച്ചില്ല! സ്ക്രിപ്റ്റ് ലിങ്ക് അല്ലെങ്കിൽ പെർമിഷൻ പരിശോധിക്കുക.";
        }
    }

    // തീയതി ഏത് രൂപത്തിൽ നൽകിയാലും ശരിയാക്കുന്ന ഭാഗം
    function parseDate(dStr) {
        if (!dStr) return null;
        let cleanDate = dStr.toString().replace(/[\/.]/g, '-');
        let p = cleanDate.split('-');
        if (p.length < 2) return null;

        let d = p[0].padStart(2, '0');
        let m = p[1].padStart(2, '0');
        let y = p[2];
        if (!y) { y = "2026"; } 
        else if (y.length === 2) { y = "20" + y; }

        return { 
            display: d + "-" + m + "-" + y, 
            sortVal: new Date(y, m - 1, d).getTime() 
        };
    }

    function applyFilters() {
        let from = parseDate(document.getElementById('fromDate').value)?.sortVal || 0;
        let to = parseDate(document.getElementById('toDate').value)?.sortVal || 9999999999999;
        
        // തീയതി അനുസരിച്ച് ലിസ്റ്റ് ക്രമീകരിക്കുന്നു
        let sorted = [...allData].sort((a, b) => (parseDate(a.date)?.sortVal  0) - (parseDate(b.date)?.sortVal  0));
        
        let rows = ''; let tInc = 0; let tExp = 0;
        sorted.forEach(item => {
            let dInfo = parseDate(item.date);
            if (dInfo && dInfo.sortVal >= from && dInfo.sortVal <= to) {
                let inc = parseFloat(item.income) || 0;
                let exp = parseFloat(item.expense) || 0;
                tInc += inc; tExp += exp;
                
                // വൗച്ചർ നമ്പർ കൂടി വിവരണത്തിൽ ചേർക്കുന്നു
                let desc = item.particulars;
                if(item.voucher) desc += " (VNo: " + item.voucher + ")";

                rows += <tr>
                    <td>${dInfo.display}</td>
                    <td style="text-align:left;">${desc}</td>
                    <td class="income-col">${inc}</td>
                    <td class="expense-col">${exp}</td>
                    <td style="font-weight:bold;">${tInc - tExp}</td>
                </tr>;
            }
        });
        document.getElementById('tableBody').innerHTML = rows;
        document.getElementById('totalRow').innerHTML = 
            <td colspan="2">ആകെ</td>
            <td class="total-inc">${tInc}</td>
            <td class="total-exp">${tExp}</td>
            <td>${tInc - tExp}</td>;
    }

    function printReport(type) {
        document.body.classList.remove('hide-inc', 'hide-exp');
        if(type === 'inc') document.body.classList.add('hide-exp');
        if(type === 'exp') document.body.classList.add('hide-inc');
        window.print();
    }
    
    window.onload = loadData;
</script>
</body>
</html>
