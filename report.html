<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day Book Report - മസ്ജിദ് & മദ്രസ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 15px; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 1000px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a5d1a; border-bottom: 3px solid #28a745; padding-bottom: 10px; margin-bottom: 20px; }
        .filter-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
        .filter-section div { display: flex; flex-direction: column; }
        .filter-section label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .filter-section input, .filter-section select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background-color: #28a745; color: white; font-weight: 600; text-transform: uppercase; font-size: 13px; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .total-row { background-color: #e8f5e9 !important; font-weight: bold; font-size: 16px; border-top: 2px solid #28a745; }
        .income-text { color: #28a745; font-weight: bold; }
        .expense-text { color: #d32f2f; font-weight: bold; }
        .balance-text { color: #007bff; font-weight: bold; }
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; margin-top: 15px; }
        .filter-btn { background: #2c3e50; color: white; }
        .print-btn { background: #28a745; color: white; }
        @media print { .filter-section, .print-btn { display: none; } }
        @media (max-width: 600px) { th, td { padding: 8px; font-size: 12px; } .filter-section { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <h2>മസ്ജിദ് & മദ്രസ ഡേ ബുക്ക് റിപ്പോർട്ട്</h2>
    
    <div class="filter-section">
        <div>
            <label>തീയതി മുതൽ (From):</label>
            <input type="date" id="fromDate">
        </div>
        <div>
            <label>തീയതി വരെ (To):</label>
            <input type="date" id="toDate">
        </div>
        <div>
            <label>ഫിൽറ്റർ ചെയ്യുക:</label>
            <select id="typeFilter">
                <option value="all">എല്ലാം (All)</option>
                <option value="income">വരവ് മാത്രം</option>
                <option value="expense">ചിലവ് മാത്രം</option>
            </select>
        </div>
        <button class="btn filter-btn" onclick="applyFilters()">റിപ്പോർട്ട് കാണുക</button>
        <button class="btn print-btn" onclick="window.print()">Print എടുക്കുക</button>
    </div>

    <div style="overflow-x:auto;">
        <table id="reportTable">
            <thead>
                <tr>
                    <th>തീയതി</th>
                    <th>വിവരണം</th>
                    <th style="background-color: #28a745; color: white;">വരവ്</th>
                    <th style="background-color: #dc3545; color: white;">ചിലവ്</th>
                    <th>ബാലൻസ്</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" style="text-align:center;">ഡാറ്റ ലോഡ് ചെയ്യുന്നു...</td></tr>
            </tbody>
            <tfoot>
                <tr class="total-row" id="totalRow"></tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzUvsNvN4ufjiM8l9I4iRZcMmJp4PvRQAevXnaE7iOsfpxgTXmurUAKF7gmB97J4Siv/exec';
    let allData = [];
    function loadData() {
        fetch(scriptURL + "?action=read")
            .then(res => res.json())
            .then(data => {
                allData = data;
                applyFilters(); 
            })
            .catch(err => {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">ഡാറ്റ ലഭ്യമായില്ല.</td></tr>';
            });
    }

    function applyFilters() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const type = document.getElementById('typeFilter').value;
        let filtered = allData;

        if (from || to) {
            filtered = filtered.filter(item => {
                let parts = item.date.split("-");
                let itemDate = new Date(parts[2], parts[1]-1, parts[0]);
                let fromDate = from ? new Date(from) : new Date(1970,0,1);
                let toDate = to ? new Date(to) : new Date(2100,0,1);
                return itemDate >= fromDate && itemDate <= toDate;
            });
        }

        if (type === 'income') {
            filtered = filtered.filter(item => parseFloat(item.income) > 0);
        } else if (type === 'expense') {
            filtered = filtered.filter(item => parseFloat(item.expense) > 0);
        }
        displayData(filtered);
    }

    function displayData(data) {
        let rows = '';
        let tInc = 0; let tExp = 0; let currentBal = 0;
        
        data.forEach(item => {
            let i = parseFloat(item.income) || 0;
            let e = parseFloat(item.expense) || 0;
            tInc += i; tExp += e; 
            currentBal = currentBal + i - e;

            rows += <tr>
                <td>${item.date}</td>
                <td>${item.particulars}</td>
                <td class="income-text">${i}</td>
                <td class="expense-text">${e}</td>
                <td class="balance-text">${currentBal}</td>
            </tr>;
        });
        
        document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="5" style="text-align:center;">വിവരങ്ങൾ ലഭ്യമല്ല.</td></tr>';
        document.getElementById('totalRow').innerHTML = 
            <td colspan="2" style="text-align:right">ആകെ ടോട്ടൽ:</td>
            <td class="income-text">${tInc}</td>
            <td class="expense-text">${tExp}</td>
            <td class="balance-text">${tInc - tExp}</td>;
    }
    window.onload = loadData;
</script>
</body>
</html>
